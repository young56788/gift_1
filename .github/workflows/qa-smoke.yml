name: qa-smoke

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  qa-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke QA
        run: npm run qa:smoke
